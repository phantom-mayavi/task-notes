<h2>Task Manager</h2>

<p>Total Tasks: {{ tasks.length }}</p>
<p>Pending Tasks: {{ pendingCount }}</p>

<div>
    <input type="text" 
    [(ngModel)]="newTaskTitle" 
    (keyup.enter)="addTask()"
    placeholder="Enter a new task" />
    <button 
        (click)="addTask()"
        [disabled]="!newTaskTitle.trim()"
    >
        Add Task
    </button>
</div>
<p *ngIf="tasks.length === 0">No tasks yet.</p>
<ul>
    <li *ngFor="let task of tasks; trackBy: taskById">
        <input
            type="checkbox"
            [checked]="task.done"
            (change)="toggle(task)"
        />
        <span
            [style.text-decoration]="task.done ? 'line-through' : 'none'"
        >
            {{ task.title }}
        </span>
        <button style="margin-left: 10px;" (click)="confirmDelete(task)">Delete</button>
    </li>
</ul>
