<h2>Task Manager</h2>

<ul>
    <li *ngFor="let task of tasks">
        <input
            type="checkbox"
            [checked]="task.done"
            (change)="toggle(task)"
        />
        <span
            [style.text-decoration]="task.done ? 'line-through' : 'none'"
        >
            {{ task.title }}
        </span>
</ul>
